# Mapillary semantic segmentation dataset (65 classes)
# Documentation: https://docs.ultralytics.com/datasets/semantic
# Example usage: yolo semantic train data=mapillary.yaml model=yolo26n-sem.pt
# parent
# ├── ultralytics
# └── datasets
#     └── mapillary ← downloads here (27 GB)
#         └── images
#             └── train
#             └── val
#         └── masks
#             └── train
#             └── val

# Dataset root directory
path: mapillary # dataset root dir
train: images/train # train images (relative to 'path') 18000 images
val: images/val # val images (relative to 'path') 2000 images

masks_dir: masks # semantic mask directory

# Mapillary 124-class labels
names:
  0: crosswalk
  1: sidewalk
  2: road
  3: vehicle

# Map 124 source label IDs to train IDs; ignore_label is converted to 255.
